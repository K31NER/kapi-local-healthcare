<!-- Burbuja del usuario -->
<div class="flex justify-end">
  <div class="max-w-sm lg:max-w-lg bg-emerald-600 text-white rounded-2xl rounded-br-sm px-4 py-2.5 text-sm leading-relaxed">
    {{ question }}
  </div>
</div>

<!-- Burbuja de Kapi con streaming Alpine.js -->
<div class="flex justify-start"
     x-data='kapiMessage({{ question | tojson }}, {{ session_id | tojson }})'
     x-init="start()">
  <div class="max-w-sm lg:max-w-xl bg-white border border-gray-200 rounded-2xl rounded-bl-sm px-4 py-3 text-sm shadow-sm space-y-2">

    <!-- Pensando -->
    <div x-show="thinking" class="flex items-center gap-2 text-gray-400 text-xs">
      <svg class="animate-spin h-3 w-3 shrink-0" viewBox="0 0 24 24" fill="none">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
      </svg>
      Analizando tu consulta…
    </div>

    <!-- Error -->
    <div x-show="!!error" x-text="error" class="text-red-500 text-xs"></div>

    <!-- Texto de respuesta (Markdown renderizado en tiempo real) -->
    <div x-show="!thinking || text.length > 0"
         x-html="marked.parse(text)"
         class="prose-kapi text-sm leading-relaxed text-gray-800"></div>

    <!-- Badge de triaje (aparece al terminar el stream) -->
    <div x-show="done && status" class="pt-1">
      <span class="inline-flex items-center gap-1 text-xs font-semibold px-2.5 py-1 rounded-full"
            :class="badgeClass()">
        <span class="material-symbols-rounded" style="font-size:14px;font-variation-settings:'FILL' 1,'wght' 500"
              x-text="badgeIcon()"></span>
        <span x-text="status"></span>
      </span>
    </div>

  </div>
</div>
