<h2 class="text-xl font-semibold text-gray-800 mb-1">Bienvenido de vuelta</h2>
<p class="text-sm text-gray-500 mb-6">Ingresa tu PIN para continuar.</p>

{% if error %}
<div class="mb-4 px-4 py-2 bg-red-50 border border-red-200 rounded-lg text-sm text-red-700">{{ error }}</div>
{% endif %}

<form method="post" action="/auth/login" class="space-y-4">
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">PIN de acceso</label>
    <input type="password" name="pin" placeholder="••••" autofocus
           class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent">
  </div>
  <button type="submit"
          class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2.5 rounded-lg text-sm transition-colors">
    Ingresar
  </button>
</form>
