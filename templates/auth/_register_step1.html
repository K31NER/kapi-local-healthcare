<h2 class="text-xl font-semibold text-gray-800 mb-1">Crear tu perfil</h2>
<div class="flex gap-2 text-xs mb-5">
  <span class="font-semibold text-emerald-600">① Info básica</span>
  <span class="text-gray-400">→ ② Salud</span>
  <span class="text-gray-400">→ ③ PIN</span>
</div>

{% if error %}
<div class="mb-4 px-4 py-2 bg-red-50 border border-red-200 rounded-lg text-sm text-red-700">{{ error }}</div>
{% endif %}

<form hx-post="/auth/register/step1" hx-target="#auth-form" hx-swap="innerHTML" class="space-y-4">
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">Nombre completo *</label>
    <input type="text" name="full_name" value="{{ initial.full_name or '' }}"
           placeholder="Ej: María García" autofocus
           class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
  </div>
  <div class="grid grid-cols-2 gap-3">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Fecha de nacimiento *</label>
      <input type="date" name="birth_date" value="{{ initial.birth_date or '' }}" max="{{ today }}"
             class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Género *</label>
      <select name="gender"
              class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
        {% for g in ["M", "F", "Otro"] %}
        <option {% if initial.gender == g %}selected{% endif %}>{{ g }}</option>
        {% endfor %}
      </select>
    </div>
  </div>
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">Tipo de sangre *</label>
    <select name="blood_type"
            class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
      {% for bt in ["A+","A-","B+","B-","AB+","AB-","O+","O-"] %}
      <option {% if initial.blood_type == bt %}selected{% endif %}>{{ bt }}</option>
      {% endfor %}
    </select>
  </div>
  <button type="submit"
          class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2.5 rounded-lg text-sm transition-colors">
    Continuar →
  </button>
</form>
