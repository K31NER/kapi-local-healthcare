<h2 class="text-xl font-semibold text-gray-800 mb-1">Salud y contacto</h2>
<div class="flex gap-2 text-xs mb-5">
  <span class="text-gray-400 line-through">① Info básica</span>
  <span class="text-gray-400">→</span>
  <span class="font-semibold text-emerald-600">② Salud</span>
  <span class="text-gray-400">→ ③ PIN</span>
</div>

{% if error %}
<div class="mb-4 px-4 py-2 bg-red-50 border border-red-200 rounded-lg text-sm text-red-700">{{ error }}</div>
{% endif %}

<form hx-post="/auth/register/step2" hx-target="#auth-form" hx-swap="innerHTML" class="space-y-4">

  <!-- Alergias -->
  <div x-data='multiSelect({{ allergies_options | tojson }}, [])' class="space-y-1">
    <label class="block text-sm font-medium text-gray-700">Alergias</label>
    <div class="flex flex-wrap gap-1 min-h-[24px]">
      <template x-for="item in selected" :key="item">
        <span class="inline-flex items-center gap-1 bg-emerald-50 text-emerald-700 border border-emerald-200 text-xs px-2 py-0.5 rounded-full">
          <span x-text="item"></span>
          <button type="button" @click="remove(item)" class="text-emerald-400 hover:text-emerald-700 leading-none">×</button>
          <input type="hidden" name="allergies" :value="item">
        </span>
      </template>
    </div>
    <div class="relative">
      <input type="text" x-model="search" @focus="open=true" @blur="setTimeout(()=>open=false,150)"
             @keydown.enter.prevent="addCustom()"
             placeholder="Buscar o escribir para agregar…"
             class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
      <div x-show="open && filtered.length > 0"
           class="absolute z-10 w-full border border-gray-200 rounded-lg mt-1 max-h-36 overflow-y-auto bg-white shadow-sm">
        <template x-for="opt in filtered" :key="opt">
          <div @mousedown.prevent="toggle(opt)"
               class="px-3 py-1.5 text-sm cursor-pointer hover:bg-gray-50 flex items-center justify-between">
            <span x-text="opt"></span>
            <span x-show="selected.includes(opt)" class="text-emerald-600 text-xs font-bold">✓</span>
          </div>
        </template>
      </div>
    </div>
  </div>

  <!-- Enfermedades crónicas -->
  <div x-data='multiSelect({{ conditions_options | tojson }}, [])' class="space-y-1">
    <label class="block text-sm font-medium text-gray-700">Enfermedades crónicas</label>
    <div class="flex flex-wrap gap-1 min-h-[24px]">
      <template x-for="item in selected" :key="item">
        <span class="inline-flex items-center gap-1 bg-blue-50 text-blue-700 border border-blue-200 text-xs px-2 py-0.5 rounded-full">
          <span x-text="item"></span>
          <button type="button" @click="remove(item)" class="text-blue-400 hover:text-blue-700 leading-none">×</button>
          <input type="hidden" name="chronic_conditions" :value="item">
        </span>
      </template>
    </div>
    <div class="relative">
      <input type="text" x-model="search" @focus="open=true" @blur="setTimeout(()=>open=false,150)"
             @keydown.enter.prevent="addCustom()"
             placeholder="Buscar o escribir para agregar…"
             class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
      <div x-show="open && filtered.length > 0"
           class="absolute z-10 w-full border border-gray-200 rounded-lg mt-1 max-h-36 overflow-y-auto bg-white shadow-sm">
        <template x-for="opt in filtered" :key="opt">
          <div @mousedown.prevent="toggle(opt)"
               class="px-3 py-1.5 text-sm cursor-pointer hover:bg-gray-50 flex items-center justify-between">
            <span x-text="opt"></span>
            <span x-show="selected.includes(opt)" class="text-blue-600 text-xs font-bold">✓</span>
          </div>
        </template>
      </div>
    </div>
  </div>

  <!-- Contacto de emergencia -->
  <div class="grid grid-cols-2 gap-3">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Contacto de emergencia *</label>
      <input type="text" name="emergency_contact_name" placeholder="Juan García"
             class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Teléfono *</label>
      <input type="text" name="emergency_contact_phone" placeholder="+57 300 123 4567"
             class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
    </div>
  </div>

  <div class="flex gap-2">
    <button type="button"
            hx-get="/auth/register/step1" hx-target="#auth-form" hx-swap="innerHTML"
            class="flex-1 border border-gray-300 text-gray-600 font-medium py-2.5 rounded-lg text-sm hover:bg-gray-50 transition-colors">
      ← Volver
    </button>
    <button type="submit"
            class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2.5 rounded-lg text-sm transition-colors">
      Continuar →
    </button>
  </div>
</form>
